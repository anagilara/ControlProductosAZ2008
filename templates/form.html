{% extends 'base.html' %}

{% block title %}{{ accion }} Producto - Control AZ2008{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-{% if accion == 'Crear' %}plus-circle{% else %}pencil{% endif %}"></i>
                    {{ accion }} Producto
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required
                               maxlength="100"
                               value="{{ producto.nombre if producto else '' }}"
                               placeholder="Ej: Laptop HP 15">
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3"
                                  maxlength="300"
                                  placeholder="Descripción breve del producto...">{{ producto.descripcion if producto else '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label fw-semibold">Precio <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="precio" name="precio"
                                       required min="0" step="0.01"
                                       value="{{ producto.precio if producto else '' }}"
                                       placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="stock" class="form-label fw-semibold">Stock</label>
                            <input type="number" class="form-control" id="stock" name="stock"
                                   min="0" step="1"
                                   value="{{ producto.stock if producto else 0 }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="categoria" class="form-label fw-semibold">Categoría</label>
                        <input type="text" class="form-control" id="categoria" name="categoria"
                               maxlength="50"
                               value="{{ producto.categoria if producto else '' }}"
                               placeholder="Ej: Electrónica, Ropa, Alimentos...">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> {{ accion }}
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
